baseURL = "https://Syauqi99.github.io/"
locale = "en-us"
title = "Syauqi's Paper Notes"
theme = "PaperMod"

[params]
  env = "production"
  title = "Syauqi"
  description = "My jittery of ideas and portfolio (sort of)"
  author = "Syauqi"

  [params.homeInfoParams]
    Title = "Tere tulemast! 👋"
    Content = "Welcome to my technical substack. I write about machine learning, analytics, math, and the projects I'm building along the way."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Syauqi99"
    title = "GitHub"

  [[params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/matsyauqirp"
    title = "Instagram"

  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/@syauqi99"
    title = "YouTube"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/syauqirp"
    title = "LinkedIn"

  # PaperMod specific options
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About Me"
    url = "/about/"
    weight = 10
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderHooks]
      [markup.goldmark.renderHooks.image]
        useEmbedded = "fallback"

